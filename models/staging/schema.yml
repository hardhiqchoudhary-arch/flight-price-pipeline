version: 2

models:
  - name: stg_flights
    description: "Cleaned and standardized raw flight data"
    columns:
      - name: id
        description: "Primary key"
        tests:
          - unique
          - not_null

      - name: origin
        description: "Origin airport code"
        tests:
          - not_null

      - name: destination
        description: "Destination airport code"
        tests:
          - not_null

      - name: price_usd
        description: "Flight price in USD"
        tests:
          - not_null

      - name: flight_date
        description: "Date of the flight"
        tests:
          - not_null

      - name: stop_type
        description: "Direct, 1 stop, or multi-stop"
        tests:
          - accepted_values:
              values: ['direct', '1 stop', 'multi-stop']